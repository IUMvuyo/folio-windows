name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer + portable .exe
        run: npx electron-builder --win --x64 --publish never

      - name: List output
        run: dir dist
        shell: cmd

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish .exe to GitHub Release (stable download link)
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v1.0.0 -y --cleanup-tag || true
          gh release create v1.0.0 dist/*.exe \
            --title "Folio for Windows v1.0.0" \
            --notes "Folio — Private, on-device PDF tools. Installer (Folio-Setup) + portable build. Nothing leaves your device."
